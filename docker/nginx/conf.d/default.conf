# ============================================================
# 视频课程分销系统 — Nginx 反向代理配置
#
# 使用方式：
#   无 SSL（测试/开发）：直接启动，HTTP 监听 80
#   有 SSL（生产）：将证书放入 ./docker/nginx/ssl/ 后取消 docker-compose.prod.yml 中的注释
#
# 证书路径：
#   ./docker/nginx/ssl/fullchain.pem
#   ./docker/nginx/ssl/privkey.pem
# ============================================================

# ---------- HTTP 服务器 ----------
# 无 SSL 时：直接反向代理 /api/ 到后端，/ 到静态资源
# 有 SSL 时：Nginx 会尝试加载 SSL 证书，失败则不启动（由注释掉 HTTPS server 段的证书行避免）
server {
    listen 80;
    server_name _;

    # 安全响应头
    add_header X-Frame-Options        SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # API 反向代理（v1 版本）
    # 旧版 /api/ 和新版 /api/v1/ 都通过此 location 透传到后端
    location /api/ {
        limit_req zone=api burst=200 nodelay;
        limit_conn addr 50;

        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;

        proxy_connect_timeout  60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
        proxy_buffering       on;
        proxy_buffer_size     8k;
        proxy_buffers         8 32k;
        client_max_body_size  500M;
    }

    # WebSocket
    location /ws/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # 静态前端
    location / {
        root   /var/www/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;

        # 静态资源长期缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)(\?v=\d+)?$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # HTML 不缓存
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

