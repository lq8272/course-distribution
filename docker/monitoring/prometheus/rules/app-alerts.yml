groups:
  - name: course-distribute-alerts
    rules:

      # ==================== 可用性告警 ====================

      - alert: BackendDown
        expr: up{job="course-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "后端服务不可用"
          description: "course-backend 已停止响应，健康检查失败已超过 1 分钟"

      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
          / sum(rate(http_requests_total[5m])) by (job)
          > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "后端 5xx 错误率超过 5%"
          description: "后端服务 5xx 错误率持续 2 分钟超过 5%，当前值: {{ $value | humanizePercentage }}"

      # ==================== 性能告警 ====================

      - alert: HighMemoryUsage
        expr: |
          nodejs_memory_heap_used_bytes{job="course-backend"}
          / nodejs_memory_heap_total_bytes{job="course-backend"}
          > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "后端堆内存使用率超过 85%"
          description: "后端堆内存使用率持续 5 分钟超过 85%，当前: {{ $value | humanizePercentage }}"

      - alert: HighMemoryUsageCritical
        expr: |
          nodejs_memory_heap_used_bytes{job="course-backend"}
          / nodejs_memory_heap_total_bytes{job="course-backend"}
          > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "后端堆内存即将耗尽"
          description: "后端堆内存使用率超过 95%，即将触发 OOM，当前: {{ $value | humanizePercentage }}"

      - alert: HighMySQLConnections
        expr: |
          mysql_connections_total{job="course-backend"}
          / 20  # 假设 DB_POOL_SIZE=20
          > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MySQL 连接池使用率超过 80%"
          description: "MySQL 连接池使用率持续 5 分钟超过 80%，当前 {{ $value | humanizePercentage }}"

      - alert: MySQLConnectionExhaustion
        expr: mysql_connections_waiting{job="course-backend"} > 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MySQL 连接池等待队列积压"
          description: "MySQL 等待连接数超过 5 个，存在连接池耗尽风险"

      - alert: RedisDisconnected
        expr: redis_connected{job="course-backend"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Redis 连接断开"
          description: "Redis 连接状态异常，服务将无法正常使用缓存和限流功能"

      # ==================== 业务告警 ====================

      - alert: WithdrawApprovalStuck
        expr: |
          sum(increase(withdraw_records_total{status="0"}[1h])) by ()
          - sum(increase(withdraw_records_total{status="1"}[1h])) by ()
          > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "提现申请积压"
          description: "待审批提现记录超过 50 条，超过 10 分钟未处理"

      # ==================== 基础资源告警 ====================

      - alert: BackendRestartingFrequently
        expr: |
          (process_uptime_seconds{job="course-backend"} > 0)
          and
          (process_uptime_seconds{job="course-backend"} < 300)
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "后端频繁重启"
          description: "后端进程最近 5 分钟内重启，上线未超过 5 分钟"
