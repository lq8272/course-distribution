name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io

jobs:
  # ---------- 后端单元测试 ----------
  backend-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: course_distribute
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:6.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Disable git symlinks (path too long workaround on some filesystems)
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --include=dev
        working-directory: backend

      - name: Initialize database schema
        run: npm run init-db
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: rootpassword
          REDIS_HOST: 127.0.0.1

      - name: Start backend server for tests
        run: |
          node src/index.js &
          echo "Waiting for backend to be ready..."
          for i in {1..20}; do
            curl -sf http://localhost:3000/api/health && echo "" && echo "Backend ready" && break
            echo "Backend not ready, waiting... ($i/20)"
            sleep 2
          done
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: rootpassword
          REDIS_HOST: 127.0.0.1

      - name: Run Jest tests
        run: npm test -- --no-cache --forceExit
        working-directory: backend
        env:
          NODE_ENV: test
          TEST_API: http://localhost:3000/api/v1
          DB_HOST: 127.0.0.1
          DB_PASSWORD: rootpassword
          REDIS_HOST: 127.0.0.1

      - name: Upload Jest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-report
          path: backend/jest-report.json
          retention-days: 14

  # ---------- 前端构建测试 ----------
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Disable git symlinks
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org --legacy-peer-deps
        working-directory: frontend

      - name: Build WeChat Mini Program
        run: npm run build:mp-weixin
        working-directory: frontend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/build/h5
          retention-days: 7

  # ---------- Docker 构建验证 ----------
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Disable git symlinks
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build -t course-backend:test -f backend/Dockerfile backend
          docker build -t course-backend:prod -f backend/Dockerfile.prod backend
        env:
          DOCKER_BUILDKIT: 1

      - name: Build frontend nginx image
        run: |
          docker build -t course-frontend:test -f frontend/Dockerfile frontend
        env:
          DOCKER_BUILDKIT: 1

  # ---------- E2E 测试 ----------
  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: course_distribute
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:6.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Disable git symlinks
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps and start backend
        run: |
          npm ci --legacy-peer-deps --include=dev
          npm run init-db
          node src/index.js &
          for i in {1..20}; do
            curl -sf http://localhost:3000/api/health && echo "Backend ready" && break
            sleep 2
          done
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: rootpassword
          REDIS_HOST: 127.0.0.1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: backend

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: /tmp/frontend-dist

      - name: Serve frontend with nginx
        run: |
          cat > /tmp/Dockerfile.frontend << 'EOF'
          FROM nginx:alpine
          COPY . /usr/share/nginx/html
          EXPOSE 80
          CMD ["nginx", "-g", "daemon off;"]
          EOF
          docker build -t course-frontend:e2e -f /tmp/Dockerfile.frontend /tmp/frontend-dist
          docker run -d --name course-frontend -p 8080:80 course-frontend:e2e

      - name: Run Playwright E2E
        run: |
          PLAYWRIGHT_BROWSERS_PATH=$HOME/.cache/ms-playwright \
          npx playwright test --config=e2e/playwright.config.js --timeout=30000
        working-directory: backend
        env:
          PLAYWRIGHT_BROWSERS_PATH: $HOME/.cache/ms-playwright

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: backend/playwright-report/
          retention-days: 14
